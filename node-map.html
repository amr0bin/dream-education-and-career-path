<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Node Map — Andrea Robin</title>
<link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:   #ffffff;
  --ink:     #303e44;
  --accent:  #475f6a;
  --mid:     #6a858f;
  --light:   #e8eef0;
  --lighter: #f4f7f8;
  --line:    #d4dde1;
  --faint:   #8fa4ad;
  --cyan:    #00b4d8;
}

body {
  background: var(--ink);
  color: var(--white);
  font-family: 'Asap', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#canvas {
  position: absolute;
  inset: 0;
  cursor: grab;
}
#canvas:active { cursor: grabbing; }

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(48,62,68,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 2rem;
  z-index: 100;
}
.brand {
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--faint);
}
.brand em { color: var(--mid); font-style: normal; }

.filter-group {
  display: flex;
  gap: 0.4rem;
  margin-left: auto;
}
.filter-btn {
  font-family: 'Asap', sans-serif;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--faint);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  padding: 0.3rem 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
.filter-btn.active { color: var(--white); background: var(--accent); border-color: var(--accent); }

.view-toggle {
  display: flex;
  gap: 0.3rem;
  margin-left: 1rem;
  border-left: 1px solid rgba(255,255,255,0.1);
  padding-left: 1rem;
}
.view-btn {
  font-family: 'Asap', sans-serif;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px;
  padding: 0.3rem 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.view-btn.active { color: var(--white); border-color: var(--accent); background: var(--accent); }

/* ── PANEL ── */
#panel {
  position: fixed;
  right: 0; top: 52px; bottom: 0;
  width: 340px;
  background: rgba(48,62,68,0.97);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(255,255,255,0.08);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  z-index: 90;
  overflow-y: auto;
  padding: 2rem 1.6rem;
}
#panel.open { transform: translateX(0); }

.panel-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: rgba(255,255,255,0.08);
  border: none;
  color: var(--faint);
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.15); color: var(--white); }

.panel-tag {
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 0.6rem;
}
.panel-title {
  font-size: 1.15rem;
  font-weight: 400;
  line-height: 1.3;
  color: var(--white);
  margin-bottom: 0.5rem;
}
.panel-sub {
  font-size: 0.8rem;
  color: var(--mid);
  line-height: 1.65;
  margin-bottom: 1.4rem;
}
.panel-divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.08);
  margin: 1.2rem 0;
}
.panel-section-label {
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 0.6rem;
}
.panel-body {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.7);
  line-height: 1.7;
}
.panel-connections {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 1rem;
}
.conn-tag {
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.25rem 0.6rem;
  border-radius: 2px;
  background: rgba(71,95,106,0.4);
  color: var(--faint);
  border: 1px solid rgba(71,95,106,0.5);
  cursor: pointer;
  transition: all 0.2s;
}
.conn-tag:hover { background: var(--accent); color: var(--white); border-color: var(--accent); }

/* ── LEGEND ── */
#legend {
  position: fixed;
  left: 1.2rem;
  bottom: 1.5rem;
  background: rgba(48,62,68,0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 1rem 1.2rem;
  z-index: 80;
  min-width: 160px;
}
.legend-title {
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 0.7rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.4rem;
  font-size: 0.7rem;
  color: var(--mid);
}
.legend-shape {
  flex-shrink: 0;
  width: 16px; height: 16px;
}

/* ── INSTRUCTIONS ── */
#instructions {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(48,62,68,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  padding: 0.5rem 1rem;
  font-size: 0.62rem;
  color: var(--faint);
  letter-spacing: 0.1em;
  pointer-events: none;
  white-space: nowrap;
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(48,62,68,0.96);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 2px;
  padding: 0.5rem 0.8rem;
  font-size: 0.72rem;
  color: var(--white);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 200px;
  line-height: 1.5;
}
#tooltip.visible { opacity: 1; }
#tooltip .tt-label { font-size: 0.6rem; color: var(--faint); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.2rem; }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">Andrea Robin — <em>Knowledge Map</em></div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-filter="vision" onclick="setFilter('vision',this)">Vision</button>
    <button class="filter-btn" data-filter="skill" onclick="setFilter('skill',this)">Skills</button>
    <button class="filter-btn" data-filter="deployment" onclick="setFilter('deployment',this)">Deployment</button>
    <button class="filter-btn" data-filter="concept" onclick="setFilter('concept',this)">Concepts</button>
    <button class="filter-btn" data-filter="challenge" onclick="setFilter('challenge',this)">Challenges</button>
    <button class="filter-btn" data-filter="checklist" onclick="setFilter('checklist',this)">Checklist</button>
    <button class="filter-btn" data-filter="impact" onclick="setFilter('impact',this)">Impact</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-2d" onclick="setView('2d')">2D</button>
    <button class="view-btn" id="btn-3d" onclick="setView('3d')">3D</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div id="tt-name"></div>
</div>

<div id="panel">
  <button class="panel-close" onclick="closePanel()">×</button>
  <div class="panel-tag" id="p-tag"></div>
  <div class="panel-title" id="p-title"></div>
  <div class="panel-sub" id="p-sub"></div>
  <hr class="panel-divider">
  <div class="panel-section-label">Detail</div>
  <div class="panel-body" id="p-body"></div>
  <hr class="panel-divider">
  <div class="panel-section-label">Connected Nodes</div>

</div>

<div id="legend">
  <div class="legend-title">Node Shapes</div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="#475f6a"/></svg>
    Core Vision
  </div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="1" fill="#6a858f"/></svg>
    Skills
  </div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><polygon points="8,1 15,15 1,15" fill="#8fa4ad"/></svg>
    Concepts
  </div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><polygon points="8,1 15,8 8,15 1,8" fill="#303e44" stroke="#8fa4ad" stroke-width="1.5"/></svg>
    Deployment
  </div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><polygon points="8,1 15,8 8,15 1,8" fill="#e8eef0"/></svg>
    Impact
  </div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><rect x="1" y="6" width="14" height="4" rx="1" fill="#6a858f"/><rect x="6" y="1" width="4" height="14" rx="1" fill="#6a858f"/></svg>
    Challenges
  </div>
  <div class="legend-item">
    <svg class="legend-shape" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5" fill="none" stroke="#8fa4ad" stroke-width="2"/><line x1="6" y1="8" x2="10" y2="8" stroke="#8fa4ad" stroke-width="1.5"/><line x1="8" y1="6" x2="8" y2="10" stroke="#8fa4ad" stroke-width="1.5"/></svg>
    Checklist
  </div>
  <div class="legend-title" style="margin-top:0.8rem">Node Size = Depth</div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════════════
const CATEGORIES = {
  vision:     { color: '#475f6a', glow: '#7ab4c8', shape: 'circle' },
  skill:      { color: '#5c7d8a', glow: '#9ecad5', shape: 'square' },
  concept:    { color: '#8fa4ad', glow: '#b8d0d8', shape: 'triangle' },
  deployment: { color: '#2c4a55', glow: '#5a8a9e', shape: 'diamond' },
  impact:     { color: '#d4dde1', glow: '#ffffff', shape: 'diamond-light' },
  challenge:  { color: '#6a5a5a', glow: '#c4a0a0', shape: 'cross' },
  checklist:  { color: '#4a6570', glow: '#8ab4c0', shape: 'ring' },
};

// depth 1–5: determines node size (1=small, 5=very large)
const NODES = [
  // ── VISION / CORE ──
  { id:'v1', label:'Vision', name:'Reduce the Depression Treatment Gap', sub:'The central organising purpose of a twenty-year career', body:'The WHO treatment gap for depression is enormous — especially in low- and middle-income countries. This career is designed to contribute meaningfully to closing that gap through learning systems, creative health approaches, and global health research. Every skill, every deployment, every credential traces back to this purpose.', cat:'vision', depth:5, connects:['v2','v3','c1','c2','c3','sk1','sk5','d1','d6','i1'] },
  { id:'v2', label:'Vision', name:'Make Space Program', sub:'Creative arts-based group therapy for depression', body:'Make Space is an original therapeutic facilitation program integrating creative health approaches — writing, visual art, music — with evidence-informed group therapy. It is simultaneously a direct intervention, a research site, and a proof-of-concept for the training multiplier model.', cat:'vision', depth:4, connects:['v1','v3','sk3','sk4','c4','d2','ch1','i2'] },
  { id:'v3', label:'Vision', name:'Multiplier Model', sub:'Train facilitators, not just deliver sessions', body:'The highest-leverage contribution is not running sessions — it is designing training systems that allow others to run sessions. One trained facilitator could reach ten cohorts. Published training systems could reach hundreds. This is the multiplier logic that connects individual practice to population-level impact.', cat:'vision', depth:4, connects:['v1','v2','sk1','sk5','d5','i1','i3','ch2'] },

  // ── SKILLS ──
  { id:'sk1', label:'Skill', name:'Instructional Systems Design', sub:'15 years applied — Advanced', body:'Designing learning sequences that build genuine competence in practitioners, not just knowledge recall. In health contexts, this requires integrating cognitive load theory, situated learning principles, and deliberate practice frameworks. The rarest version of this skill is the capacity to design training systems that hold their fidelity when delivered by someone other than the designer.', cat:'skill', depth:5, connects:['v1','v3','sk2','sk5','d1','d3','ch3'] },
  { id:'sk2', label:'Skill', name:'Knowledge Translation', sub:'Intermediate — deployed in Substack practice', body:'Making research evidence usable and actionable for practitioners who are not researchers. This means identifying what the evidence actually says (not what people believe it says), translating it into decision-relevant language, and designing outputs that reach people in the contexts where they make decisions.', cat:'skill', depth:3, connects:['sk1','sk5','c1','d2','d4','i4'] },
  { id:'sk3', label:'Skill', name:'Therapeutic Group Facilitation', sub:'Developing — active practice', body:'Facilitating therapeutic group experiences for people experiencing depression. This requires holding the group process while also attending to individual participants, managing the tension between structure and emergence, and maintaining appropriate scope of practice boundaries.', cat:'skill', depth:3, connects:['v2','sk4','c4','d2','ch4'] },
  { id:'sk4', label:'Skill', name:'Creative Health Facilitation', sub:'Arts-based approaches to depression', body:'Using creative practice — writing, visual art, music — as a therapeutic medium for depression. Grounded in the Fancourt & Finn 2019 Lancet evidence base and the emerging creative health literature. The specific application is designing creative experiences that are evidence-informed and replicable.', cat:'skill', depth:3, connects:['v2','sk3','c4','c5','d2','i2'] },
  { id:'sk5', label:'Skill', name:'Universal Design for Learning', sub:'Intermediate — applied, CPACC prep underway', body:'Designing learning experiences that are accessible by default to people with a wide range of abilities, disabilities, and learning differences. In the context of mental health and depression, UDL is essential because the population disproportionately includes people with disabilities and neurodivergent individuals.', cat:'skill', depth:3, connects:['sk1','sk2','c2','d3','c6','i5'] },
  { id:'sk6', label:'Skill', name:'Health Systems Thinking', sub:'Understanding mental health delivery architecture', body:'Understanding how mental health systems are structured, funded, and constrained at the system level. A depression program that works in a well-resourced Canadian health authority setting may fail completely in a low-resource context — not because the clinical model is wrong, but because the implementation assumptions were built into a specific system architecture.', cat:'skill', depth:4, connects:['sk1','c1','c3','d1','d5','d6','ch5','i1'] },
  { id:'sk7', label:'Skill', name:'Research & Academic Writing', sub:'Publication in development', body:'Writing for peer-reviewed publication in health and education journals. This includes the systematic review methodology, qualitative research methods, and the ability to frame original contributions to the field. The conceptual paper connecting learning systems design and global mental health is the first major product.', cat:'skill', depth:3, connects:['sk2','sk6','c1','d4','ch6','i4'] },
  { id:'sk8', label:'Skill', name:'Integration — Holding it All at Once', sub:'The rarest and highest-value skill', body:'The capacity to be in the room with a person experiencing depression and simultaneously think about the population-level evidence, the training system that would make this replicable, the disability justice analysis of who is currently excluded, and the research question that would make this knowledge travel. The individual skills are learnable. The integration is the work of twenty years.', cat:'skill', depth:5, connects:['v1','v2','v3','sk1','sk3','sk4','sk5','sk6','sk7'] },

  // ── CONCEPTS ──
  { id:'c1', label:'Concept', name:'Task Shifting', sub:'Redistributing care from specialists to non-specialists', body:'WHO and global health researchers have developed frameworks for training non-specialist health workers to deliver evidence-based mental health interventions. This is the primary mechanism for addressing the global treatment gap. Key scholars: Vikram Patel, Ricardo Araya. Key framework: WHO mhGAP Intervention Guide.', cat:'concept', depth:4, connects:['v1','sk1','sk6','sk7','c3','d5','d6','i1','i3'] },
  { id:'c2', label:'Concept', name:'Disability Justice', sub:'Structural analysis of who is excluded from care', body:'Disability justice moves beyond individual impairment to understand disability as a social construct shaped by systemic inequities — racism, ableism, socio-economic disparities. For mental health access, this means attending to who is currently excluded from care by design, not by accident.', cat:'concept', depth:3, connects:['sk5','c6','d3','i5','ch5'] },
  { id:'c3', label:'Concept', name:'Implementation Science', sub:'How interventions actually get adopted', body:'Implementation science studies the methods and strategies that facilitate the uptake of evidence-based practices into routine use. For this career, it is the bridge between clinical research (what works) and systems change (what gets used). Key journals: Implementation Science, CFIR framework.', cat:'concept', depth:3, connects:['c1','sk6','d5','d6','i3','ch2'] },
  { id:'c4', label:'Concept', name:'Creative Health', sub:'Evidence base for arts and wellbeing', body:'The Fancourt & Finn 2019 Lancet report established a robust evidence base for arts and cultural engagement as contributors to health outcomes, including depression. Creative health is now a recognized field in UK and Canadian health systems, with growing policy traction.', cat:'concept', depth:4, connects:['v2','sk3','sk4','c5','d2','i2'] },
  { id:'c5', label:'Concept', name:'Depression Treatment Evidence', sub:'Cochrane reviews and psychological treatments', body:'The systematic evidence base for psychological treatments for depression — CBT, behavioural activation, interpersonal therapy. Understanding what the evidence actually shows, including its limitations, is the precondition for any credible clinical or training work in this space.', cat:'concept', depth:3, connects:['c4','sk3','sk7','d2','i2'] },
  { id:'c6', label:'Concept', name:'Universal Health Coverage', sub:'The policy goal that task shifting serves', body:'Universal Health Coverage — the WHO commitment that all people can access quality health services without financial hardship — is the policy frame that gives task shifting its urgency. The treatment gap for depression is fundamentally a coverage gap, and training systems are part of how it gets closed.', cat:'concept', depth:3, connects:['c1','c2','c3','i1','i3','i5'] },
  { id:'c7', label:'Concept', name:'Knowledge Translation Frameworks', sub:'iKT, KTA cycle, SPOR', body:'Integrated Knowledge Translation (iKT) engages knowledge users throughout the research process, not just at the end. The Knowledge to Action cycle (Graham et al.) provides a framework for adapting knowledge to local context. SPOR — Strategy for Patient-Oriented Research — is the Canadian funding framework for research that engages patients as partners.', cat:'concept', depth:3, connects:['sk2','sk7','d4','i4','ch6'] },
  { id:'c8', label:'Concept', name:'Theory of Change', sub:'Explicit causal chain from action to impact', body:'Not a vision statement — a specific causal chain: "I will develop evidence-based creative health interventions for depression, train practitioners to deliver them in low-resource settings, and publish the training systems so that other researchers can adapt and scale them." Each link in this chain is an empirical question that must be tested.', cat:'concept', depth:4, connects:['v1','v3','i1','i3','ch1','ch2'] },

  // ── DEPLOYMENT ──
  { id:'d1', label:'Deployment', name:'Health Authority Learning & Development', sub:'Day job — sector proximity, stable income', body:'Senior learning design roles inside health systems (BC Mental Health and Substance Use Services, Vancouver Coastal Health, Fraser Health). The day job builds vocabulary, relationships, and systemic context. The right employer sees outside intellectual and creative work as an asset, not a conflict.', cat:'deployment', depth:4, connects:['sk1','sk6','v1','ch5','ch3','i1'] },
  { id:'d2', label:'Deployment', name:'Make Space Sessions', sub:'Direct facilitation practice and research site', body:'Running Make Space sessions is simultaneously direct clinical practice, research site documentation, and proof-of-concept for the facilitator training model. Each session generates observational data, participant feedback, and reflective journal material that feeds the qualitative research paper.', cat:'deployment', depth:4, connects:['v2','sk3','sk4','c4','c5','i2'] },
  { id:'d3', label:'Deployment', name:'Accessible Learning Labs', sub:'Consulting for accessible design', body:'Consulting practice applying Universal Design for Learning principles to educational and organisational settings. Builds credibility in the accessibility and disability justice space. The reframing task is to describe these projects in implementation science and global health language.', cat:'deployment', depth:2, connects:['sk5','c2','d1','i5'] },
  { id:'d4', label:'Deployment', name:'Substack — Knowledge Translation', sub:'Monthly translation discipline, public audience', body:'The Substack practice is the primary venue for translating research evidence into accessible, actionable writing for a non-academic audience. Consistent publication builds a public record of knowledge translation competence and an audience for the work. The discipline: one evidence-based piece per month minimum.', cat:'deployment', depth:2, connects:['sk2','sk7','c7','i4'] },
  { id:'d5', label:'Deployment', name:'Leeds MSc — Disability Studies', sub:'Scholarly standing for the disability-depression thread', body:'The Leeds MSc gives the disability justice framework scholarly standing and makes the disability-depression intersection a legitimate research thread. During this period, the first peer-reviewed publications enter the record and the Make Space documentation deepens into research material.', cat:'deployment', depth:4, connects:['v3','c1','c2','c3','c6','ch6','i3','i5'] },
  { id:'d6', label:'Deployment', name:'LSHTM / Global Health Track', sub:'International research credibility', body:'The LSHTM route (or equivalent) establishes international research credibility in the global mental health field — specifically in task shifting, implementation science, and low-resource mental health delivery. This is where the PhD research program takes shape around a specific research question.', cat:'deployment', depth:4, connects:['v1','c1','c3','c6','sk6','sk7','i1','i3'] },
  { id:'d7', label:'Deployment', name:'80,000 Hours Advising', sub:'Career impact calibration', body:'The 80,000 Hours advising application is a ten-minute action with potentially significant return — access to researchers and advisors who think carefully about career impact and the expected value of different paths in the mental health space. Identified as a priority Week 1–2 action.', cat:'deployment', depth:1, connects:['v1','c8','ch1'] },

  // ── IMPACT ──
  { id:'i1', label:'Impact', name:'Reduce Global Depression Treatment Gap', sub:'Population-level change', body:'The animating outcome of the entire career. The treatment gap is largest in low- and middle-income countries, where 76–85% of people with mental disorders receive no treatment. The specific contribution is training systems that allow non-specialists to deliver evidence-based depression interventions at scale.', cat:'impact', depth:5, connects:['v1','v3','c1','c6','c8','d5','d6'] },
  { id:'i2', label:'Impact', name:'Accessible Creative Health Pathways', sub:'Depression support that reaches excluded groups', body:'Make Space and the creative health work create pathways to depression support for people who are not reached by clinical services — people who would not see a psychiatrist, who cannot afford private therapy, who live in communities without specialist mental health services.', cat:'impact', depth:3, connects:['v2','c4','c5','d2'] },
  { id:'i3', label:'Impact', name:'Replicable Training Systems', sub:'Published, open, adaptable', body:'The highest-leverage product of this career is not the sessions run or the papers published — it is training systems that others can pick up, adapt, and use to train facilitators in their own contexts. A training system that works in Vancouver needs to be designed from the start to be adaptable to Nairobi.', cat:'impact', depth:4, connects:['v3','c1','c3','c8','d5','d6','sk1'] },
  { id:'i4', label:'Impact', name:'Public Knowledge Translation', sub:'Evidence that actually travels', body:'Research evidence that does not reach practitioners and policymakers has no impact. The Substack practice, the published papers in accessible formats, and the consulting deliverables are all part of making evidence travel — from academic journals into rooms where decisions are made.', cat:'impact', depth:2, connects:['sk2','sk7','c7','d4'] },

// ════════════════════════════════════════════════════════════
//  LAYOUT — place nodes in 3D space
// ════════════════════════════════════════════════════════════
function layoutNodes() {
  // Orbital shells by category
  const shells = {
    vision:     { r: 0,   yBase: 0 },
    skill:      { r: 260, yBase: 60 },
    concept:    { r: 200, yBase: -80 },
    deployment: { r: 340, yBase: 30 },
    impact:     { r: 170, yBase: 140 },
    challenge:  { r: 300, yBase: -140 },
    checklist:  { r: 380, yBase: -30 },
  };

  const counts = {};
  NODES.forEach(n => { counts[n.cat] = (counts[n.cat]||0)+1; });
  const indices = {};

  NODES.forEach(n => {
    indices[n.cat] = (indices[n.cat]||0);
    const idx = indices[n.cat]++;
    const total = counts[n.cat];
    const shell = shells[n.cat];

    if (shell.r === 0) {
      // vision cluster — small sphere arrangement
      const phi = Math.acos(-1 + (2*idx)/Math.max(total-1,1));
      const theta = Math.PI * (1+Math.sqrt(5)) * idx;
      n.x = Math.sin(phi)*Math.cos(theta)*80;
      n.y = Math.cos(phi)*80;
      n.z = Math.sin(phi)*Math.sin(theta)*80;
    } else {
      const angle = (2*Math.PI*idx)/total + (n.cat==='skill'?0.3:0) + (n.cat==='concept'?1.1:0);
      const ySpread = ((idx/(total-1||1))-0.5)*120;
      n.x = Math.cos(angle)*shell.r;
      n.y = shell.yBase + ySpread;
      n.z = Math.sin(angle)*shell.r;
    }
  });
}

layoutNodes();

// Build adjacency for quick lookup
const nodeMap = {};
NODES.forEach(n => { nodeMap[n.id] = n; });

// ════════════════════════════════════════════════════════════
//  CANVAS + RENDERER
// ════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Camera state
let rotX = -0.25, rotY = 0.3;
let targetRotX = rotX, targetRotY = rotY;
let zoom = 1;
let targetZoom = 1;
let is3D = false;
let panX = 0, panY = 0;
let targetPanX = 0, targetPanY = 0;

// Interaction
let isDragging = false, dragStart = {x:0,y:0}, lastMouse = {x:0,y:0};
let hoveredId = null, selectedId = null;
let activeFilter = 'all';

// Auto-rotate
let autoRotate = true;
let lastInteraction = Date.now();

// ── PROJECT ──
function project(x, y, z) {
  if (!is3D) {
    return { sx: W/2 + panX + x*zoom, sy: H/2 + panY + y*zoom, depth: 1 };
  }
  // Rotate Y
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let rx = x*cosY + z*sinY;
  let ry = y;
  let rz = -x*sinY + z*cosY;

  // Rotate X
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let fx = rx;
  let fy = ry*cosX - rz*sinX;
  let fz = ry*sinX + rz*cosX;

  const fov = 600;
  const scale = fov / (fov + fz + 400);
  return {
    sx: W/2 + panX + fx*scale*zoom,
    sy: H/2 + panY + fy*scale*zoom,
    depth: scale,
    fz: fz,
  };
}

// ── NODE SIZE ──
function nodeRadius(node, proj) {
  const base = 10 + node.depth*6;
  return base * (proj.depth||1) * zoom * 0.85;
}

// ── DRAW SHAPE ──
function drawShape(ctx, shape, cx, cy, r, color, glow, alpha, hovered, selected) {
  ctx.save();
  ctx.globalAlpha = alpha;

  if (selected) {
    ctx.shadowColor = glow;
    ctx.shadowBlur = 28*zoom;
  } else if (hovered) {
    ctx.shadowColor = glow;
    ctx.shadowBlur = 18*zoom;
  }

  ctx.fillStyle = color;
  ctx.strokeStyle = selected ? '#ffffff' : (hovered ? glow : 'rgba(255,255,255,0.15)');
  ctx.lineWidth = selected ? 2 : (hovered ? 1.5 : 0.8);

  ctx.beginPath();
  if (shape==='circle') {
    ctx.arc(cx, cy, r, 0, Math.PI*2);
  } else if (shape==='square') {
    ctx.rect(cx-r*0.85, cy-r*0.85, r*1.7, r*1.7);
  } else if (shape==='triangle') {
    ctx.moveTo(cx, cy-r);
    ctx.lineTo(cx+r*0.866, cy+r*0.5);
    ctx.lineTo(cx-r*0.866, cy+r*0.5);
    ctx.closePath();
  } else if (shape==='diamond' || shape==='diamond-light') {
    ctx.moveTo(cx, cy-r);
    ctx.lineTo(cx+r*0.75, cy);
    ctx.lineTo(cx, cy+r);
    ctx.lineTo(cx-r*0.75, cy);
    ctx.closePath();
  } else if (shape==='cross') {
    // Draw as octagon for challenge
    for (let i=0;i<8;i++) {
      const a = (i/8)*Math.PI*2 + Math.PI/8;
      if (i===0) ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
      else ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    }
    ctx.closePath();
  } else if (shape==='ring') {
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, r*0.55, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(48,62,68,0.85)';
  }

  ctx.fill();
  ctx.stroke();

  // Inner highlight
  if (shape !== 'ring' && r > 10) {
    ctx.beginPath();
    if (shape==='circle') ctx.arc(cx-r*0.25, cy-r*0.25, r*0.3, 0, Math.PI*2);
    else ctx.arc(cx-r*0.2, cy-r*0.2, r*0.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();
  }

  ctx.restore();
}

// ── DRAW LABEL ──
function drawLabel(ctx, node, cx, cy, r, alpha, hovered, selected) {
  if (r * zoom < 8 && !hovered && !selected) return;
  ctx.save();
  ctx.globalAlpha = Math.min(alpha, selected||hovered ? 1 : (r < 14 ? 0.6 : 0.85));
  const fontSize = Math.max(9, Math.min(13, r*0.7));
  ctx.font = `400 ${fontSize}px 'Asap', sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const words = node.name.split(' ');
  let lines = [];
  let line = '';
  const maxW = r*3.5;
  words.forEach(w => {
    const test = line ? line+' '+w : w;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line); line = w;
    } else line = test;
  });
  if (line) lines.push(line);
  lines = lines.slice(0,3);

  const lh = fontSize*1.2;
  const yStart = cy + r + 5;
  lines.forEach((l,i) => {
    ctx.fillText(l, cx, yStart + i*lh);
  });
  ctx.restore();
}

// ── EDGES ──
function drawEdges(projected) {
  NODES.forEach(n => {
    if (!isVisible(n)) return;
    const a = projected[n.id];
    if (!a) return;
    n.connects.forEach(cid => {
      if (cid <= n.id) return; // avoid double-draw
      const target = nodeMap[cid];
      if (!target || !isVisible(target)) return;
      const b = projected[cid];
      if (!b) return;
      const isSel = (n.id===selectedId||cid===selectedId);
      const isHov = (n.id===hoveredId||cid===hoveredId);
      const alpha = isSel ? 0.7 : (isHov ? 0.45 : 0.12);
      const width = isSel ? 1.5 : (isHov ? 1 : 0.5);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = isSel ? '#7ab4c8' : '#8fa4ad';
      ctx.lineWidth = width;
      ctx.setLineDash(isSel ? [] : [4,6]);
      ctx.beginPath();
      ctx.moveTo(a.sx, a.sy);
      ctx.lineTo(b.sx, b.sy);
      ctx.stroke();
      ctx.restore();
    });
  });
}

function isVisible(node) {
  if (activeFilter==='all') return true;
  return node.cat === activeFilter;
}

// ── MAIN RENDER ──
function render() {
  ctx.clearRect(0, 0, W, H);

  // Auto-rotate in 3D
  if (is3D && autoRotate && Date.now()-lastInteraction > 2000) {
    rotY += 0.003;
  }

  // Easing
  rotX += (targetRotX-rotX)*0.08;
  rotY += (targetRotY-rotY)*0.08;
  zoom += (targetZoom-zoom)*0.1;
  panX += (targetPanX-panX)*0.1;
  panY += (targetPanY-panY)*0.1;

  // Project all nodes
  const projected = {};
  const sorted = [...NODES].sort((a,b) => {
    if (!is3D) return 0;
    const pa = project(a.x,a.y,a.z);
    const pb = project(b.x,b.y,b.z);
    return (pa.fz||0)-(pb.fz||0);
  });

  NODES.forEach(n => { projected[n.id] = project(n.x,n.y,n.z); });

  drawEdges(projected);

  sorted.forEach(n => {
    if (!isVisible(n)) return;
    const p = projected[n.id];
    const cat = CATEGORIES[n.cat];
    const hovered = n.id===hoveredId;
    const selected = n.id===selectedId;
    const alpha = selected||hovered ? 1 : (activeFilter!=='all'&&isVisible(n) ? 1 : 0.75);
    const r = nodeRadius(n, p);

    // Connection highlight
    const connHighlight = selectedId && nodeMap[selectedId].connects.includes(n.id);
    const finalAlpha = !selectedId ? alpha : (selected||connHighlight ? 1 : 0.25);

    drawShape(ctx, cat.shape, p.sx, p.sy, r,
      selectedId&&!selected&&connHighlight ? lighten(cat.color) : cat.color,
      cat.glow, finalAlpha, hovered, selected);
    drawLabel(ctx, n, p.sx, p.sy, r, finalAlpha, hovered, selected);
  });

  requestAnimationFrame(render);
}

function lighten(hex) {
  // lighten a hex color
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+40)},${Math.min(255,g+50)},${Math.min(255,b+60)})`;
}

// ════════════════════════════════════════════════════════════
//  HIT TESTING
// ════════════════════════════════════════════════════════════
function hitTest(mx, my) {
  let best = null, bestDist = Infinity;
  NODES.forEach(n => {
    if (!isVisible(n)) return;
    const p = project(n.x,n.y,n.z);
    const r = nodeRadius(n, p)*1.3;
    const dx = mx-p.sx, dy = my-p.sy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < r && dist < bestDist) {
      bestDist = dist; best = n;
    }
  });
  return best;
}

// ════════════════════════════════════════════════════════════
//  MOUSE / TOUCH
// ════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
const ttLabel = document.getElementById('tt-label');
const ttName = document.getElementById('tt-name');

canvas.addEventListener('mousemove', e => {
  lastMouse = {x:e.clientX, y:e.clientY};
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (is3D) {
      targetRotY = rotY + dx*0.007;
      targetRotX = rotX + dy*0.007;
    } else {
      targetPanX = panX + dx*0.5;
      targetPanY = panY + dy*0.5;
    }
    lastInteraction = Date.now();
    autoRotate = false;
  } else {
    const hit = hitTest(e.clientX, e.clientY);
    hoveredId = hit ? hit.id : null;
    if (hit) {
      ttLabel.textContent = hit.label;
      ttName.textContent = hit.name;
      tooltip.style.left = (e.clientX+14)+'px';
      tooltip.style.top = (e.clientY-10)+'px';
      tooltip.classList.add('visible');
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.classList.remove('visible');
      canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
    }
  }
});

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = {x:e.clientX, y:e.clientY};
  autoRotate = false;
  lastInteraction = Date.now();
});

canvas.addEventListener('mouseup', e => {
  const moved = Math.abs(e.clientX-dragStart.x)+Math.abs(e.clientY-dragStart.y);
  isDragging = false;
  if (moved < 5) {
    const hit = hitTest(e.clientX, e.clientY);
    if (hit) {
      selectNode(hit.id);
    } else {
      deselectNode();
    }
  }
  setTimeout(()=>{ autoRotate = true; }, 3000);
});

canvas.addEventListener('dblclick', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    // Focus camera on this node
    const p = project(hit.x, hit.y, hit.z);
    targetPanX = W/2 - p.sx + panX;
    targetPanY = H/2 - p.sy + panY;
    targetZoom = Math.min(2.2, zoom*1.4);
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetZoom = Math.max(0.3, Math.min(3, targetZoom * (e.deltaY>0?0.92:1.09)));
  lastInteraction = Date.now();
}, {passive:false});

canvas.addEventListener('mouseleave', ()=>{
  isDragging = false;
  tooltip.classList.remove('visible');
});

// Touch
let touches = [];
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  isDragging = true;
  autoRotate = false;
  dragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  touches = Array.from(e.touches);
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if (e.touches.length===2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const pd = Math.hypot(touches[0].clientX-touches[1].clientX, touches[0].clientY-touches[1].clientY);
    targetZoom = Math.max(0.3, Math.min(3, targetZoom*(d/pd)));
    touches = Array.from(e.touches);
  } else if (e.touches.length===1) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    if (is3D) {
      targetRotY = rotY + dx*0.007;
      targetRotX = rotX + dy*0.007;
    }
    dragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }
}, {passive:false});
canvas.addEventListener('touchend', e=>{
  isDragging = false;
  setTimeout(()=>{ autoRotate = true; }, 3000);
}, {passive:false});

// ════════════════════════════════════════════════════════════
//  PANEL
// ════════════════════════════════════════════════════════════
function selectNode(id) {
  selectedId = id;
  const n = nodeMap[id];
  if (!n) return;

  document.getElementById('p-tag').textContent = n.label + ' — ' + n.cat.toUpperCase();
  document.getElementById('p-title').textContent = n.name;
  document.getElementById('p-sub').textContent = n.sub;
  document.getElementById('p-body').textContent = n.body;

  const connDiv = document.getElementById('p-connections');
  connDiv.innerHTML = '';
  (n.connects||[]).forEach(cid => {
    const cn = nodeMap[cid];
    if (!cn) return;
    const tag = document.createElement('span');
    tag.className = 'conn-tag';
    tag.textContent = cn.name;
    tag.onclick = ()=>selectNode(cid);
    connDiv.appendChild(tag);
  });

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  selectedId = null;
  document.getElementById('panel').classList.remove('open');
}

function deselectNode() {
  selectedId = null;
  document.getElementById('panel').classList.remove('open');
}

window.closePanel = closePanel;
window.deselectNode = deselectNode;

// ════════════════════════════════════════════════════════════
//  FILTER + VIEW CONTROLS
// ════════════════════════════════════════════════════════════
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedId = null;
  document.getElementById('panel').classList.remove('open');
}
window.setFilter = setFilter;

function setView(v) {
  is3D = v==='3d';
  document.getElementById('btn-2d').classList.toggle('active', !is3D);
  document.getElementById('btn-3d').classList.toggle('active', is3D);
  if (!is3D) {
    targetRotX=0; targetRotY=0;
    targetPanX=0; targetPanY=0;
    targetZoom=0.85;
    autoRotate=false;
  } else {
    targetZoom=0.9;
    autoRotate=true;
    lastInteraction = 0;
  }
}
window.setView = setView;

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
targetZoom = 0.85;
zoom = 0.85;
render();
</script>
